<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>QR Contact</title>

<!-- ICONS -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<!-- QR -->
<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

<style>
body {
  font-family: Arial;
  text-align: center;
  padding: 20px;
}

.container {
  max-width: 400px;
  margin: auto;
}

.input-group {
  display: flex;
  align-items: center;
  margin: 10px 0;
}

.input-group i {
  margin-right: 10px;
}

input, select {
  flex: 1;
  padding: 8px;
}

#qrcode {
  margin-top: 20px;
}
</style>
</head>

<body>

<div class="container">
<h2>Dijital Kartını Oluştur</h2>

<div class="input-group">
<i class="fa fa-user"></i>
<input id="name" placeholder="Ad Soyad">
</div>

<div class="input-group">
<i class="fa fa-phone"></i>
<select id="country">
  <option value="+90">🇹🇷 +90</option>
  <option value="+1">🇺🇸 +1</option>
  <option value="+44">🇬🇧 +44</option>
</select>
<input id="phone" placeholder="Telefon">
</div>

<div class="input-group">
<i class="fa fa-envelope"></i>
<input id="email" placeholder="Email">
</div>

<h4>Sosyal Medya</h4>

<div id="socials"></div>

<button onclick="addSocial()">+ Sosyal Medya Ekle</button>

<div id="qrcode"></div>

</div>

<script>
function generateVCF() {
  const name = document.getElementById("name").value;
  const phone = document.getElementById("country").value + document.getElementById("phone").value;
  const email = document.getElementById("email").value;

  let vcf = `
BEGIN:VCARD
VERSION:3.0
FN:${name}
TEL:${phone}
EMAIL:${email}
`;

  document.querySelectorAll(".social").forEach(s => {
    const type = s.querySelector("select").value;
    const value = s.querySelector("input").value;
    if(value) {
      vcf += `URL:${value}\n`;
    }
  });

  vcf += "END:VCARD";

  const blob = new Blob([vcf], { type: "text/vcard" });
  const url = URL.createObjectURL(blob);

  generateQR(url);
}

function generateQR(data) {
  const qrDiv = document.getElementById("qrcode");
  qrDiv.innerHTML = "";

  QRCode.toCanvas(data, function (err, canvas) {
    qrDiv.appendChild(canvas);
  });
}

function addSocial() {
  const div = document.createElement("div");
  div.className = "social input-group";

  div.innerHTML = `
    <select>
      <option value="instagram">Instagram</option>
      <option value="linkedin">LinkedIn</option>
      <option value="github">GitHub</option>
    </select>
    <input placeholder="Link gir">
  `;

  document.getElementById("socials").appendChild(div);

  div.querySelector("input").addEventListener("input", generateVCF);
}

document.querySelectorAll("input, select").forEach(el => {
  el.addEventListener("input", generateVCF);
});
</script>

</body>
</html>
