<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LinkUp QR | Digital Contact Card</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

    <style>
        :root {
            --bg-color: #fff5f7; /* Soft Pink Background */
            --card-bg: #ffffff;
            --primary-accent: #f472b6; /* Toz Pembe */
            --text-main: #4a4a4a;
            --text-muted: #9f9f9f;
            --input-bg: #fffafb;
            --input-border: #ffe4e9;
        }

        * { box-sizing: border-box; -webkit-font-smoothing: antialiased; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 40px 20px;
        }

        .card {
            background: var(--card-bg);
            width: 100%;
            max-width: 550px;
            padding: 40px;
            border-radius: 40px;
            box-shadow: 0 20px 40px rgba(244, 114, 182, 0.1);
            text-align: center;
            border: 2px solid #fff;
        }

        h1 {
            font-size: 2.2rem;
            font-weight: 800;
            margin: 0 0 10px 0;
            color: var(--primary-accent); /* Toz Pembe Başlık */
            letter-spacing: -0.04em;
        }

        .description {
            font-size: 0.95rem;
            color: var(--text-muted);
            margin-bottom: 30px;
        }

        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }

        .input-wrapper { margin-bottom: 18px; text-align: left; }

        .label {
            display: block;
            font-size: 0.75rem;
            font-weight: 700;
            margin-bottom: 6px;
            color: #d1a3ac;
            letter-spacing: 0.05em;
        }

        .input-container {
            display: flex;
            align-items: center;
            background: var(--input-bg);
            border: 1.5px solid var(--input-border);
            border-radius: 18px;
            padding: 12px 16px;
            transition: all 0.3s ease;
        }

        .input-container:focus-within {
            border-color: var(--primary-accent);
            background: #fff;
            box-shadow: 0 0 0 4px rgba(244, 114, 182, 0.1);
        }

        .input-container i { color: #f9a8d4; margin-right: 12px; }

        input, select {
            border: none;
            background: transparent;
            outline: none;
            width: 100%;
            font-size: 0.95rem;
            color: var(--text-main);
            font-family: inherit;
        }

        .social-section { margin-top: 25px; text-align: left; }

        .social-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .add-btn {
            background: #ffe4e9;
            color: var(--primary-accent);
            border: none;
            padding: 8px 15px;
            border-radius: 12px;
            font-size: 0.8rem;
            font-weight: 700;
            cursor: pointer;
            transition: 0.2s;
        }

        .add-btn:hover { background: var(--primary-accent); color: #fff; }

        .dynamic-row {
            display: grid;
            grid-template-columns: 1fr 1.5fr;
            gap: 10px;
            margin-bottom: 10px;
        }

        .qr-area {
            margin-top: 35px;
            padding: 25px;
            background: #fffafa;
            border-radius: 30px;
            display: inline-block;
            border: 1px dashed #ffd1da;
        }

        #qrcode canvas { border-radius: 15px; }
    </style>
</head>
<body>

<div class="card">
    <h1>LinkUp QR</h1>
    <p class="description">Your elegant digital identity.</p>

    <div class="grid-2">
        <div class="input-wrapper">
            <span class="label">FIRST NAME</span>
            <div class="input-container"><input type="text" id="fname" placeholder="John" oninput="generateVCF()"></div>
        </div>
        <div class="input-wrapper">
            <span class="label">LAST NAME</span>
            <div class="input-container"><input type="text" id="lname" placeholder="Doe" oninput="generateVCF()"></div>
        </div>
    </div>

    <div class="grid-2">
        <div class="input-wrapper">
            <span class="label">JOB TITLE</span>
            <div class="input-container"><input type="text" id="title" placeholder="Engineer" oninput="generateVCF()"></div>
        </div>
        <div class="input-wrapper">
            <span class="label">COMPANY</span>
            <div class="input-container"><input type="text" id="company" placeholder="Company Inc." oninput="generateVCF()"></div>
        </div>
    </div>

    <div class="input-wrapper">
        <span class="label">PHONE NUMBER</span>
        <div class="input-container">
            <select id="country" style="width: 140px;" onchange="generateVCF()">
                </select>
            <input type="tel" id="phone" placeholder="Phone digits" oninput="generateVCF()">
        </div>
    </div>

    <div class="input-wrapper">
        <span class="label">WEBSITE</span>
        <div class="input-container">
            <i class="fa-solid fa-link"></i>
            <input type="url" id="website" placeholder="https://..." oninput="generateVCF()">
        </div>
    </div>

    <div class="input-wrapper">
        <span class="label">EMAIL</span>
        <div class="input-container">
            <i class="fa-regular fa-envelope"></i>
            <input type="email" id="email" placeholder="hello@world.com" oninput="generateVCF()">
        </div>
    </div>

    <div class="social-section">
        <div class="social-header">
            <span class="label">SOCIAL PROFILES</span>
            <button class="add-btn" onclick="addSocial()">+ Add New</button>
        </div>
        <div id="socialList"></div>
    </div>

    <div id="qrContainer" class="qr-area" style="display: none;">
        <div id="qrcode"></div>
        <p style="font-size: 0.75rem; color: #f472b6; margin-top: 10px; font-weight: 600;">Scan to Save Contact</p>
    </div>
</div>

<script>
    // GÖRSELLERDEKİ TÜM ÜLKE KODLARI
    const countries = [
        { n: "Türkiye", c: "+90" }, { n: "Fransa", c: "+33" }, { n: "Belçika", c: "+32" },
        { n: "Hollanda", c: "+31" }, { n: "Almanya", c: "+49" }, { n: "İtalya", c: "+39" },
        { n: "Birleşik Krallık", c: "+44" }, { n: "İrlanda", c: "+353" }, { n: "Danimarka", c: "+45" },
        { n: "Yunanistan", c: "+30" }, { n: "Portekiz", c: "+351" }, { n: "İspanya", c: "+34" },
        { n: "Lüksemburg", c: "+352" }, { n: "İzlanda", c: "+354" }, { n: "Norveç", c: "+47" },
        { n: "İsveç", c: "+46" }, { n: "Finlandiya", c: "+358" }, { n: "İsviçre", c: "+41" },
        { n: "Avusturya", c: "+43" }, { n: "Azerbaycan", c: "+994" }, { n: "Kazakistan", c: "+7" },
        { n: "Rusya", c: "+7" }, { n: "ABD", c: "+1" }, { n: "Kanada", c: "+1" },
        { n: "KKTC", c: "+392" }, { n: "Güney Kore", c: "+82" }, { n: "Japonya", c: "+81" },
        { n: "BAE", c: "+971" }, { n: "Suudi Arabistan", c: "+966" }, { n: "Katar", c: "+974" }
    ];

    // İSTEDİĞİN TÜM SOSYAL MEDYA PLATFORMLARI
    const socialPlatforms = [
        "Facebook", "YouTube", "WhatsApp", "Instagram", "WeChat", "TikTok", 
        "Messenger", "Douyin", "QQ", "Telegram", "Snapchat", "Kuaishou", 
        "Pinterest", "Reddit", "Twitter / X", "LinkedIn", "Baidu Tieba", 
        "Sina Weibo", "Viber", "Discord"
    ];

    function init() {
        const countrySelect = document.getElementById('country');
        countries.sort((a,b) => a.n.localeCompare(b.n)).forEach(item => {
            const opt = new Option(`${item.n} (${item.c})`, item.c);
            countrySelect.add(opt);
        });
        addSocial();
    }

    function addSocial() {
        const list = document.getElementById('socialList');
        const row = document.createElement('div');
        row.className = 'dynamic-row';
        let options = socialPlatforms.map(p => `<option value="${p}">${p}</option>`).join('');
        row.innerHTML = `
            <div class="input-container"><select onchange="generateVCF()">${options}</select></div>
            <div class="input-container"><input type="text" placeholder="Username/ID" oninput="generateVCF()"></div>
        `;
        list.appendChild(row);
    }

    function generateVCF() {
        const fn = document.getElementById('fname').value;
        const ln = document.getElementById('lname').value;
        const job = document.getElementById('title').value;
        const comp = document.getElementById('company').value;
        const phone = document.getElementById('country').value + document.getElementById('phone').value;
        const email = document.getElementById('email').value;
        const web = document.getElementById('website').value;

        if (!fn && !ln && !email && !phone.length > 4) {
            document.getElementById('qrContainer').style.display = 'none';
            return;
        }

        let vcf = `BEGIN:VCARD\nVERSION:3.0\nFN:${fn} ${ln}\nN:${ln};${fn};;;\nORG:${comp}\nTITLE:${job}\nTEL;TYPE=CELL:${phone}\nEMAIL:${email}\nURL:${web}`;

        document.querySelectorAll('.dynamic-row').forEach(row => {
            const p = row.querySelector('select').value;
            const h = row.querySelector('input').value;
            if (h) vcf += `\nX-SOCIAL-PROFILE;TYPE=${p}:${h}`;
        });

        vcf += `\nEND:VCARD`;
        document.getElementById('qrContainer').style.display = 'inline-block';
        renderQR(vcf);
    }

    function renderQR(data) {
        const qrDiv = document.getElementById('qrcode');
        qrDiv.innerHTML = "";
        QRCode.toCanvas(data, { width: 180, color: { dark: '#4a4a4a', light: '#ffffff' } }, (err, cvs) => {
            if (err) console.error(err);
            qrDiv.appendChild(cvs);
        });
    }

    window.onload = init;
</script>
</body>
</html>
